<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Library Scan - SwitchShelf</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <img src="icons/icon-192.png" alt="" class="app-logo" width="48" height="48" />
    <div>
      <h1>Library Scan</h1>
      <p class="subtitle">Match your local title files against titledb. Nothing is accepted automatically &mdash; review each match below.</p>
      <nav><a href="index.html">Search</a> · <a href="scan.html">Library Scan</a></nav>
    </div>
  </header>

  <main>
    <section class="controls">
      <label for="region-select">Match against</label>
      <select id="region-select"></select>
      <button id="scan-btn">Scan library</button>
      <button id="default-region-btn" class="secondary" title="Remember this region and pre-select it on future visits">☆ Set as default</button>
      <span id="scan-status" class="status"></span>
    </section>

    <section id="summary" class="status"></section>

    <table id="results">
      <thead>
        <tr>
          <th>File</th>
          <th>Extracted ID</th>
          <th>Proposed match</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>

    <section class="controls">
      <button id="organize-btn" class="secondary">Organize accepted files &#9662;</button>
      <span id="organize-status" class="status"></span>
    </section>

    <div id="organize-panel" class="organize-panel" hidden>
      <div id="organize-summary" class="status"></div>
      <table id="organize-table">
        <thead>
          <tr>
            <th></th>
            <th>Current file</th>
            <th>New location</th>
            <th>Type</th>
          </tr>
        </thead>
        <tbody id="organize-body"></tbody>
      </table>
      <div id="organize-skipped"></div>
      <button id="organize-apply-btn" disabled>Move selected files</button>
    </div>
  </main>

  <div id="modal-backdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-message" class="modal-message"></div>
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="secondary">Cancel</button>
        <button id="modal-confirm-btn">OK</button>
      </div>
    </div>
  </div>

  <script src="region-pref.js"></script>
  <script src="scan.js"></script>
</body>
</html>
